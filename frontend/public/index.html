<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e8502a" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary SEO -->
    <title>Clameo — Votre lettre, prête en 2 minutes</title>
    <meta
      name="description"
      content="Générez en 2 minutes une lettre française prête à envoyer : remboursement, logement, mise en demeure, RGPD, banque, voisinage et plus. Modèles structurés, fournis à titre indicatif."
    />
    <meta
      name="keywords"
      content="lettre, modèle de lettre, remboursement, mise en demeure, RGPD, logement, employeur, consommation, voisinage, banque, lettre type"
    />
    <meta name="author" content="Clameo" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://clameo.fr/" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Clameo" />
    <meta property="og:title" content="Clameo — Votre lettre, prête en 2 minutes" />
    <meta
      property="og:description"
      content="Réclamation, remboursement, logement, travail, RGPD… générez une lettre structurée, prête à copier, télécharger ou imprimer."
    />
    <meta property="og:url" content="https://clameo.fr/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Clameo — Votre lettre, prête en 2 minutes" />
    <meta
      name="twitter:description"
      content="Des lettres françaises structurées, prêtes à copier, télécharger ou imprimer."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- JSON-LD WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Clameo",
        "url": "https://clameo.fr/",
        "inLanguage": "fr-FR",
        "applicationCategory": "BusinessApplication",
        "description": "Générateur de lettres françaises structurées : remboursement, logement, mise en demeure, RGPD, banque, voisinage…",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        }
      }
    </script>

    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        },
        true
      );
    </script>

      </head>

  <body>
    <noscript>Vous devez activer JavaScript pour utiliser Clameo.</noscript>
    <div id="root"></div>
  </body>
</html>
